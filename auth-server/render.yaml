services:
  - type: web
    name: vaultfs-auth-server
    runtime: node
    rootDir: auth-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SERVER_URL
        sync: false
    healthCheckPath: /health
