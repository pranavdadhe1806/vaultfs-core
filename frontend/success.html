<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticated — VaultFS</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Arial", sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .check-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            opacity: 0;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .check-ring svg {
            width: 32px;
            height: 32px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.6s forwards;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p {
            font-size: 17px;
            color: #86868b;
            line-height: 1.5;
            max-width: 320px;
        }

        .hint {
            margin-top: 40px;
            font-size: 13px;
            color: #424245;
            letter-spacing: 0.2px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #2c2c2e;
            letter-spacing: 0.2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>You're all set.</h1>
        <p>Authentication successful. You can close this tab and return to your terminal.</p>
        <div class="hint">This window will close automatically.</div>
    </div>

    <div class="footer">VaultFS &middot; Secure File System Simulator</div>

    <script>
        setTimeout(() => {
            try { window.close(); } catch(e) {}
        }, 3000);
    </script>
</body>
</html>
