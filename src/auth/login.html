<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultFS Authentication</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-color: #1d1d1f;
            --container-bg: #ffffff;
            --border-color: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.08) 0px 4px 24px;
            --button-hover: #f5f5f7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #f5f5f7;
                --container-bg: #1c1c1e;
                --border-color: #38383a;
                --shadow: rgba(0, 0, 0, 0.4) 0px 4px 24px;
                --button-hover: #2c2c2e;
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.3s ease;
        }

        .login-container {
            background: var(--container-bg);
            padding: 48px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid var(--border-color);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 42px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: #86868b;
            margin: 0 0 32px 0;
        }

        .auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            margin-bottom: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: inherit;
        }

        .auth-btn:hover {
            background: var(--button-hover);
            transform: scale(1.02);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .primary-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
        }

        .primary-btn:hover {
            opacity: 0.9;
            background: var(--text-color);
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            border-color: #86868b;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #86868b;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
    </style>
</head>
<body>

    <div class="login-container" id="main-view">
        <div class="logo">🗂️</div>
        <h1>Sign in to VaultFS</h1>
        <p>Authenticate local sessions securely.</p>

        <button class="auth-btn" onclick="showInputForm('Google')">
            <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:12px;">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <button class="auth-btn" onclick="showInputForm('GitHub')">
            <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:12px;">
                <path fill="currentColor" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            Continue with GitHub
        </button>

        <div class="divider">or</div>

        <button class="auth-btn" style="border:none" onclick="failLogin()">
            Continue as Guest
        </button>
    </div>

    <div class="login-container" id="input-view" style="display:none;">
        <div class="logo">🗂️</div>
        <h1 id="provider-title">Sign in</h1>
        <p>Enter an account to simulate the session.</p>

        <input type="text" id="username" class="input-field" placeholder="Username or Email" autofocus />
        
        <button class="auth-btn primary-btn" onclick="submitLogin()">Authenticate</button>
        <button class="auth-btn" style="border:none; margin-top:8px;" onclick="cancelLogin()">Cancel</button>
    </div>

    <script>
        let selectedProvider = '';

        function showInputForm(provider) {
            selectedProvider = provider;
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('input-view').style.display = 'block';
            document.getElementById('provider-title').innerText = `Sign in with ${provider}`;
            document.getElementById('username').focus();
        }

        function cancelLogin() {
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('username').value = '';
        }

        function submitLogin() {
            const input = document.getElementById('username').value.trim();
            if (!input) return;

            let name = input;
            let email = input.includes('@') ? input : `${input.toLowerCase().replace(/\s+/g, '')}@${selectedProvider.toLowerCase()}.com`;
            
            const token = "auth-" + Math.random().toString(36).substr(2, 9);
            const callbackUrl = `/callback?token=${encodeURIComponent(token)}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`;
            
            document.body.innerHTML = '<div style="text-align:center;"><h2>Authenticating...</h2></div>';
            
            setTimeout(() => {
                window.location.href = callbackUrl;
            }, 600);
        }

        function failLogin() {
            const callbackUrl = `/callback?status=failed`;
            document.body.innerHTML = '<div style="text-align:center;"><h2>Setting up guest session...</h2></div>';
            
            setTimeout(() => {
                window.location.href = callbackUrl;
            }, 600);
        }

        // Allow pressing Enter to submit
        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') submitLogin();
        });
    </script>
</body>
</html>
